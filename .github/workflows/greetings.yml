name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - name: Welcome Message
      uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Welcome to the ISaidBoot!! repository! 🍭 Thank you for opening your first issue. We appreciate your feedback!"
        pr-message: "Thank you for creating a pull request! 🚀 We will review your code changes shortly."
