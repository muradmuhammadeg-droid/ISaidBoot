name: Automated Release Build Pipeline

on:
  push:
    tags:
      - 'v1.0' # Triggers strictly for the specific v1.0 release tag and nothing else

jobs:
  release-build:
    runs-on: windows-2022
    permissions:
      contents: write 

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Initialize MSVC Developer Environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile Cross-Platform Executable Binary
      run: |
        build.bat
      shell: cmd

    - name: Create and Upload Asset to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ISaidBoot.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
